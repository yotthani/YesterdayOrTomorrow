<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="none">
  <defs>
    <!-- LCARS Gradients -->
    <linearGradient id="lcars-orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffaa44"/>
      <stop offset="100%" style="stop-color:#cc6600"/>
    </linearGradient>
    <linearGradient id="lcars-tan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ddaa77"/>
      <stop offset="100%" style="stop-color:#aa7744"/>
    </linearGradient>
    <linearGradient id="lcars-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cc99ff"/>
      <stop offset="100%" style="stop-color:#9966cc"/>
    </linearGradient>
    <linearGradient id="lcars-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9999ff"/>
      <stop offset="100%" style="stop-color:#6666cc"/>
    </linearGradient>
  </defs>

  <!-- Top Left Corner Cap -->
  <path d="M0,0 L80,0 L80,40 Q80,60 60,60 L0,60 Z" fill="url(#lcars-orange)"/>

  <!-- Top Bar -->
  <rect x="90" y="0" width="300" height="35" rx="17" fill="url(#lcars-orange)"/>
  <rect x="400" y="0" width="200" height="35" rx="17" fill="url(#lcars-tan)"/>
  <rect x="610" y="0" width="190" height="35" rx="17" fill="url(#lcars-purple)"/>

  <!-- Left Sidebar -->
  <rect x="0" y="70" width="70" height="100" fill="url(#lcars-orange)"/>
  <rect x="0" y="175" width="70" height="80" fill="url(#lcars-tan)"/>
  <rect x="0" y="260" width="70" height="80" fill="url(#lcars-purple)"/>
  <rect x="0" y="345" width="70" height="80" fill="url(#lcars-blue)"/>

  <!-- Bottom Left Corner -->
  <path d="M0,440 L0,430 Q0,410 20,410 L70,410 L70,500 L0,500 Z" fill="url(#lcars-purple)"/>

  <!-- Main Frame Border -->
  <rect x="80" y="45" width="710" height="445" rx="30" ry="30"
        fill="none" stroke="url(#lcars-orange)" stroke-width="4"/>

  <!-- Inner Content Area -->
  <rect x="90" y="55" width="690" height="425" rx="25" ry="25" fill="#000010"/>
</svg>
