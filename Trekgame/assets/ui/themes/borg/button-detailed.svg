<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- BORG DETAILED BUTTON: Cybernetic rectangular with circuit traces -->
  <defs>
    <linearGradient id="borgBtnBlack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2A2A"/>
      <stop offset="50%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#2A2A2A"/>
    </linearGradient>

    <linearGradient id="borgBtnGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF00"/>
      <stop offset="50%" style="stop-color:#00AA00"/>
      <stop offset="100%" style="stop-color:#00FF00"/>
    </linearGradient>

    <filter id="borgBtnGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#00FF00" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Hex grid pattern for button -->
    <pattern id="btnHexGrid" x="0" y="0" width="20" height="23" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 20 6 L 20 17.5 L 10 23 L 0 17.5 L 0 6 Z" fill="none" stroke="rgba(0,255,0,0.1)" stroke-width="0.3"/>
    </pattern>

    <!-- Circuit pattern -->
    <pattern id="btnCircuit" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <line x1="0" y1="10" x2="20" y2="10" stroke="rgba(0,255,0,0.15)" stroke-width="0.5"/>
      <line x1="30" y1="25" x2="50" y2="25" stroke="rgba(0,255,0,0.1)" stroke-width="0.5"/>
      <line x1="20" y1="10" x2="20" y2="40" stroke="rgba(0,255,0,0.15)" stroke-width="0.5"/>
      <circle cx="20" cy="10" r="1.5" fill="rgba(0,255,0,0.25)"/>
      <circle cx="20" cy="40" r="1" fill="rgba(0,255,0,0.2)"/>
    </pattern>
  </defs>

  <!-- Button base - sharp rectangular -->
  <rect x="2" y="2" width="196" height="46" fill="url(#borgBtnBlack)"/>

  <!-- Hex grid overlay -->
  <rect x="2" y="2" width="196" height="46" fill="url(#btnHexGrid)"/>

  <!-- Circuit overlay -->
  <rect x="2" y="2" width="196" height="46" fill="url(#btnCircuit)"/>

  <!-- Green border lines -->
  <rect x="2" y="2" width="196" height="1" fill="url(#borgBtnGreen)" filter="url(#borgBtnGlow)"/>
  <rect x="2" y="47" width="196" height="1" fill="url(#borgBtnGreen)" opacity="0.6"/>
  <rect x="2" y="2" width="1" height="46" fill="url(#borgBtnGreen)" opacity="0.8"/>
  <rect x="197" y="2" width="1" height="46" fill="url(#borgBtnGreen)" opacity="0.8"/>

  <!-- Corner node indicators -->
  <circle cx="8" cy="8" r="3" fill="#0A0A0A"/>
  <circle cx="8" cy="8" r="2" fill="url(#borgBtnGreen)" filter="url(#borgBtnGlow)"/>

  <circle cx="192" cy="8" r="3" fill="#0A0A0A"/>
  <circle cx="192" cy="8" r="2" fill="url(#borgBtnGreen)" filter="url(#borgBtnGlow)"/>

  <circle cx="8" cy="42" r="3" fill="#0A0A0A"/>
  <circle cx="8" cy="42" r="2" fill="url(#borgBtnGreen)" opacity="0.6"/>

  <circle cx="192" cy="42" r="3" fill="#0A0A0A"/>
  <circle cx="192" cy="42" r="2" fill="url(#borgBtnGreen)" opacity="0.6"/>

  <!-- Circuit traces connecting corners -->
  <line x1="12" y1="8" x2="40" y2="8" stroke="url(#borgBtnGreen)" stroke-width="0.5" opacity="0.5"/>
  <line x1="160" y1="8" x2="188" y2="8" stroke="url(#borgBtnGreen)" stroke-width="0.5" opacity="0.5"/>
  <line x1="12" y1="42" x2="40" y2="42" stroke="url(#borgBtnGreen)" stroke-width="0.5" opacity="0.3"/>
  <line x1="160" y1="42" x2="188" y2="42" stroke="url(#borgBtnGreen)" stroke-width="0.5" opacity="0.3"/>

  <!-- Central data node -->
  <circle cx="100" cy="25" r="5" fill="#0A0A0A"/>
  <circle cx="100" cy="25" r="3" fill="url(#borgBtnGreen)" filter="url(#borgBtnGlow)"/>

  <!-- Data lines to center -->
  <line x1="45" y1="25" x2="95" y2="25" stroke="url(#borgBtnGreen)" stroke-width="0.5" opacity="0.4"/>
  <line x1="105" y1="25" x2="155" y2="25" stroke="url(#borgBtnGreen)" stroke-width="0.5" opacity="0.4"/>

  <!-- Secondary nodes -->
  <circle cx="45" cy="25" r="2" fill="url(#borgBtnGreen)" opacity="0.5"/>
  <circle cx="155" cy="25" r="2" fill="url(#borgBtnGreen)" opacity="0.5"/>
</svg>
