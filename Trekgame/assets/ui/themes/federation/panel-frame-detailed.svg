<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- LCARS Detailed Panel Frame: Authentic Star Trek TNG/DS9/Voyager style -->
  <defs>
    <!-- Main LCARS gradients with shine -->
    <linearGradient id="lcarsOrangeMain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFAA66"/>
      <stop offset="15%" style="stop-color:#FF9944"/>
      <stop offset="50%" style="stop-color:#CC6633"/>
      <stop offset="85%" style="stop-color:#FF9944"/>
      <stop offset="100%" style="stop-color:#FFAA66"/>
    </linearGradient>

    <linearGradient id="lcarsVioletMain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CC99FF"/>
      <stop offset="15%" style="stop-color:#AA77DD"/>
      <stop offset="50%" style="stop-color:#8855BB"/>
      <stop offset="85%" style="stop-color:#AA77DD"/>
      <stop offset="100%" style="stop-color:#CC99FF"/>
    </linearGradient>

    <linearGradient id="lcarsTanMain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFDDAA"/>
      <stop offset="15%" style="stop-color:#EEBB88"/>
      <stop offset="50%" style="stop-color:#CC9966"/>
      <stop offset="85%" style="stop-color:#EEBB88"/>
      <stop offset="100%" style="stop-color:#FFDDAA"/>
    </linearGradient>

    <linearGradient id="lcarsPinkMain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFAACC"/>
      <stop offset="15%" style="stop-color:#FF88AA"/>
      <stop offset="50%" style="stop-color:#DD6699"/>
      <stop offset="85%" style="stop-color:#FF88AA"/>
      <stop offset="100%" style="stop-color:#FFAACC"/>
    </linearGradient>

    <linearGradient id="lcarsBlueMain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#99CCFF"/>
      <stop offset="15%" style="stop-color:#77AAEE"/>
      <stop offset="50%" style="stop-color:#5588CC"/>
      <stop offset="85%" style="stop-color:#77AAEE"/>
      <stop offset="100%" style="stop-color:#99CCFF"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="lcarsGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="lcarsInnerShadow">
      <feOffset dx="2" dy="2"/>
      <feGaussianBlur stdDeviation="2"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Noise texture pattern -->
    <pattern id="lcarsNoise" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="rgba(255,255,255,0.03)"/>
      <circle cx="10" cy="10" r="0.5" fill="rgba(255,255,255,0.1)"/>
      <circle cx="30" cy="25" r="0.5" fill="rgba(255,255,255,0.1)"/>
      <circle cx="50" cy="40" r="0.5" fill="rgba(255,255,255,0.08)"/>
      <circle cx="70" cy="15" r="0.5" fill="rgba(255,255,255,0.1)"/>
      <circle cx="90" cy="60" r="0.5" fill="rgba(255,255,255,0.08)"/>
      <circle cx="20" cy="80" r="0.5" fill="rgba(255,255,255,0.1)"/>
      <circle cx="60" cy="70" r="0.5" fill="rgba(255,255,255,0.08)"/>
      <circle cx="80" cy="90" r="0.5" fill="rgba(255,255,255,0.1)"/>
    </pattern>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LEFT SIDEBAR - Main LCARS column with multiple color segments -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- Left sidebar base (tan/beige) -->
  <rect x="0" y="80" width="100" height="440" fill="url(#lcarsTanMain)" filter="url(#lcarsInnerShadow)"/>
  <rect x="0" y="80" width="100" height="440" fill="url(#lcarsNoise)"/>

  <!-- Top elbow (orange) - distinctive LCARS rounded corner -->
  <path d="
    M 0 0
    L 0 80
    L 100 80
    L 100 50
    Q 100 0 150 0
    L 800 0
    L 800 50
    L 150 50
    Q 110 50 100 60
    L 100 80
    L 0 80
    L 0 0
    Z
  " fill="url(#lcarsOrangeMain)" filter="url(#lcarsInnerShadow)"/>
  <path d="
    M 0 0
    L 0 80
    L 100 80
    L 100 50
    Q 100 0 150 0
    L 800 0
    L 800 50
    L 150 50
    Q 110 50 100 60
    L 100 80
    L 0 80
    L 0 0
    Z
  " fill="url(#lcarsNoise)"/>

  <!-- Bottom elbow (violet) -->
  <path d="
    M 0 520
    L 100 520
    L 100 550
    Q 100 600 150 600
    L 800 600
    L 800 550
    L 150 550
    Q 110 550 100 540
    L 100 520
    L 0 520
    L 0 600
    Z
  " fill="url(#lcarsVioletMain)" filter="url(#lcarsInnerShadow)"/>
  <path d="
    M 0 520
    L 100 520
    L 100 550
    Q 100 600 150 600
    L 800 600
    L 800 550
    L 150 550
    Q 110 550 100 540
    L 100 520
    L 0 520
    L 0 600
    Z
  " fill="url(#lcarsNoise)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SIDEBAR COLOR SEGMENTS - Stacked colored blocks -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- Pink segment -->
  <rect x="0" y="100" width="95" height="60" rx="0" fill="url(#lcarsPinkMain)"/>
  <rect x="0" y="100" width="95" height="60" fill="url(#lcarsNoise)"/>

  <!-- Blue segment -->
  <rect x="0" y="170" width="95" height="50" rx="0" fill="url(#lcarsBlueMain)"/>
  <rect x="0" y="170" width="95" height="50" fill="url(#lcarsNoise)"/>

  <!-- Orange segment -->
  <rect x="0" y="230" width="95" height="70" rx="0" fill="url(#lcarsOrangeMain)"/>
  <rect x="0" y="230" width="95" height="70" fill="url(#lcarsNoise)"/>

  <!-- Violet segment -->
  <rect x="0" y="310" width="95" height="55" rx="0" fill="url(#lcarsVioletMain)"/>
  <rect x="0" y="310" width="95" height="55" fill="url(#lcarsNoise)"/>

  <!-- Tan segment -->
  <rect x="0" y="375" width="95" height="65" rx="0" fill="url(#lcarsTanMain)"/>
  <rect x="0" y="375" width="95" height="65" fill="url(#lcarsNoise)"/>

  <!-- Pink segment bottom -->
  <rect x="0" y="450" width="95" height="60" rx="0" fill="url(#lcarsPinkMain)"/>
  <rect x="0" y="450" width="95" height="60" fill="url(#lcarsNoise)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SIDEBAR SEPARATOR LINES - LCARS characteristic thin lines -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <rect x="0" y="98" width="95" height="2" fill="#000"/>
  <rect x="0" y="160" width="95" height="2" fill="#000"/>
  <rect x="0" y="168" width="95" height="2" fill="#000"/>
  <rect x="0" y="220" width="95" height="2" fill="#000"/>
  <rect x="0" y="228" width="95" height="2" fill="#000"/>
  <rect x="0" y="300" width="95" height="2" fill="#000"/>
  <rect x="0" y="308" width="95" height="2" fill="#000"/>
  <rect x="0" y="365" width="95" height="2" fill="#000"/>
  <rect x="0" y="373" width="95" height="2" fill="#000"/>
  <rect x="0" y="440" width="95" height="2" fill="#000"/>
  <rect x="0" y="448" width="95" height="2" fill="#000"/>
  <rect x="0" y="510" width="95" height="2" fill="#000"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- TOP BAR - Horizontal bar with data readouts -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- Data display blocks on top bar -->
  <rect x="170" y="10" width="80" height="30" rx="15" fill="url(#lcarsTanMain)"/>
  <rect x="260" y="10" width="60" height="30" rx="15" fill="url(#lcarsPinkMain)"/>
  <rect x="330" y="10" width="100" height="30" rx="15" fill="url(#lcarsBlueMain)"/>
  <rect x="440" y="10" width="70" height="30" rx="15" fill="url(#lcarsVioletMain)"/>
  <rect x="520" y="10" width="90" height="30" rx="15" fill="url(#lcarsOrangeMain)"/>
  <rect x="620" y="10" width="50" height="30" rx="15" fill="url(#lcarsTanMain)"/>
  <rect x="680" y="10" width="100" height="30" rx="15" fill="url(#lcarsPinkMain)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- BOTTOM BAR - Status indicators -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- Status display blocks on bottom bar -->
  <rect x="170" y="560" width="120" height="30" rx="15" fill="url(#lcarsBlueMain)"/>
  <rect x="300" y="560" width="80" height="30" rx="15" fill="url(#lcarsTanMain)"/>
  <rect x="390" y="560" width="150" height="30" rx="15" fill="url(#lcarsOrangeMain)"/>
  <rect x="550" y="560" width="60" height="30" rx="15" fill="url(#lcarsPinkMain)"/>
  <rect x="620" y="560" width="160" height="30" rx="15" fill="url(#lcarsVioletMain)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- INNER CONTENT CORNER DECORATIONS -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- Inner corner fill (transparent content area) -->
  <rect x="105" y="55" width="690" height="490" fill="rgba(0,0,0,0.85)"/>

  <!-- Corner accent indicators -->
  <circle cx="115" cy="65" r="5" fill="url(#lcarsOrangeMain)" filter="url(#lcarsGlow)"/>
  <circle cx="785" cy="65" r="5" fill="url(#lcarsOrangeMain)" filter="url(#lcarsGlow)"/>
  <circle cx="115" cy="535" r="5" fill="url(#lcarsVioletMain)" filter="url(#lcarsGlow)"/>
  <circle cx="785" cy="535" r="5" fill="url(#lcarsVioletMain)" filter="url(#lcarsGlow)"/>

  <!-- Subtle scan line effect overlay -->
  <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="2" fill="rgba(0,0,0,0.05)"/>
  </pattern>
  <rect x="105" y="55" width="690" height="490" fill="url(#scanlines)"/>
</svg>
