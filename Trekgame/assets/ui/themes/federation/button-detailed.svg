<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- LCARS Detailed Button: Authentic pill button with glow and texture -->
  <defs>
    <linearGradient id="lcarsButtonOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFBB77"/>
      <stop offset="20%" style="stop-color:#FF9944"/>
      <stop offset="50%" style="stop-color:#DD7722"/>
      <stop offset="80%" style="stop-color:#FF9944"/>
      <stop offset="100%" style="stop-color:#FFBB77"/>
    </linearGradient>

    <linearGradient id="lcarsButtonOrangeHover" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCC99"/>
      <stop offset="50%" style="stop-color:#FFAA55"/>
      <stop offset="100%" style="stop-color:#FFCC99"/>
    </linearGradient>

    <filter id="buttonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#FF9944" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="innerShine">
      <feSpecularLighting surfaceScale="3" specularConstant="1" specularExponent="20" result="spec">
        <fePointLight x="100" y="-50" z="200"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in"/>
      <feComposite in="SourceGraphic" operator="arithmetic" k1="0" k2="1" k3="0.3" k4="0"/>
    </filter>

    <pattern id="buttonNoise" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="rgba(255,255,255,0.02)"/>
      <circle cx="5" cy="10" r="0.3" fill="rgba(255,255,255,0.15)"/>
      <circle cx="25" cy="20" r="0.3" fill="rgba(255,255,255,0.1)"/>
      <circle cx="45" cy="5" r="0.3" fill="rgba(255,255,255,0.12)"/>
      <circle cx="15" cy="35" r="0.3" fill="rgba(255,255,255,0.1)"/>
      <circle cx="35" cy="45" r="0.3" fill="rgba(255,255,255,0.08)"/>
    </pattern>
  </defs>

  <!-- Button base - pill shape -->
  <rect x="2" y="2" width="196" height="46" rx="23" ry="23" fill="url(#lcarsButtonOrange)" filter="url(#buttonGlow)"/>

  <!-- Texture overlay -->
  <rect x="2" y="2" width="196" height="46" rx="23" ry="23" fill="url(#buttonNoise)"/>

  <!-- Top highlight -->
  <rect x="10" y="4" width="180" height="20" rx="10" fill="rgba(255,255,255,0.15)"/>

  <!-- Bottom shadow -->
  <rect x="10" y="30" width="180" height="15" rx="8" fill="rgba(0,0,0,0.1)"/>

  <!-- Left cap decoration -->
  <circle cx="25" cy="25" r="8" fill="rgba(0,0,0,0.2)"/>
  <circle cx="25" cy="25" r="5" fill="rgba(255,255,255,0.2)"/>

  <!-- Right cap decoration -->
  <circle cx="175" cy="25" r="8" fill="rgba(0,0,0,0.2)"/>
  <circle cx="175" cy="25" r="5" fill="rgba(255,255,255,0.2)"/>
</svg>
