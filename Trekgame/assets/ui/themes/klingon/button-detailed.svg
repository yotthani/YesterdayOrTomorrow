<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- KLINGON DETAILED BUTTON: Aggressive hexagonal shape with metallic finish -->
  <defs>
    <!-- Main button gradients -->
    <linearGradient id="klingonBtnMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#555555"/>
      <stop offset="20%" style="stop-color:#3A3A3A"/>
      <stop offset="50%" style="stop-color:#252525"/>
      <stop offset="80%" style="stop-color:#3A3A3A"/>
      <stop offset="100%" style="stop-color:#555555"/>
    </linearGradient>

    <linearGradient id="klingonBtnRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DD4444"/>
      <stop offset="50%" style="stop-color:#991111"/>
      <stop offset="100%" style="stop-color:#DD4444"/>
    </linearGradient>

    <linearGradient id="klingonBtnOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8833"/>
      <stop offset="50%" style="stop-color:#CC5500"/>
      <stop offset="100%" style="stop-color:#FF8833"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="klingonBtnShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.7"/>
    </filter>

    <filter id="klingonBtnGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#FF3333" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Brushed metal texture -->
    <pattern id="btnBrushed" x="0" y="0" width="50" height="3" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="50" y2="0" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
      <line x1="0" y1="1.5" x2="50" y2="1.5" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Main hexagonal button shape -->
  <path d="
    M 20 0
    L 180 0
    L 200 25
    L 180 50
    L 20 50
    L 0 25
    Z
  " fill="url(#klingonBtnMetal)" filter="url(#klingonBtnShadow)"/>

  <!-- Brushed metal overlay -->
  <path d="
    M 20 0
    L 180 0
    L 200 25
    L 180 50
    L 20 50
    L 0 25
    Z
  " fill="url(#btnBrushed)"/>

  <!-- Red accent stripe at top -->
  <path d="
    M 25 3
    L 175 3
    L 193 22
    L 175 8
    L 25 8
    L 8 22
    Z
  " fill="url(#klingonBtnRed)" opacity="0.9"/>

  <!-- Inner bevel highlight -->
  <path d="
    M 25 5
    L 175 5
    L 190 25
    L 175 45
    L 25 45
    L 10 25
    Z
  " fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Inner bevel shadow -->
  <path d="
    M 25 48
    L 175 48
    L 195 25
  " fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>

  <!-- Orange accent triangles on ends -->
  <path d="M 5 25 L 20 15 L 20 35 Z" fill="url(#klingonBtnOrange)" opacity="0.8"/>
  <path d="M 195 25 L 180 15 L 180 35 Z" fill="url(#klingonBtnOrange)" opacity="0.8"/>

  <!-- Corner rivets -->
  <circle cx="30" cy="12" r="2" fill="#222"/>
  <circle cx="30" cy="12" r="1" fill="#555"/>
  <circle cx="170" cy="12" r="2" fill="#222"/>
  <circle cx="170" cy="12" r="1" fill="#555"/>
  <circle cx="30" cy="38" r="2" fill="#222"/>
  <circle cx="30" cy="38" r="1" fill="#555"/>
  <circle cx="170" cy="38" r="2" fill="#222"/>
  <circle cx="170" cy="38" r="1" fill="#555"/>
</svg>
